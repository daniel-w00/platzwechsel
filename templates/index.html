<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seat Optimizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }

        .gradient-text {
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            transition: all 0.2s ease;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.5);
        }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

        .btn-secondary {
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            transition: all 0.2s ease;
        }
        .btn-secondary:hover {
            transform: translateY(-1px);
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.4);
        }

        /* ── Chair layout ──
           Structure (top row):   [back] [seat + person-circle]
           Structure (bottom row): [seat + person-circle] [back]
        */
        .chair-container {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            margin: 4px 3px;
            flex-shrink: 0;
        }

        /* Prominent chair back */
        .chair-back {
            width: 54px;
            height: 30px;
            border: 2.5px solid rgba(99,102,241,0.6);
            background: linear-gradient(180deg, #1e2e50, #151f38);
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            flex-shrink: 0;
        }
        .chair-back.top    { border-radius: 14px 14px 0 0; border-bottom: none; }
        .chair-back.bottom { border-radius: 0 0 14px 14px; border-top: none; }
        .chair-back.complete { border-color: #22c55e; background: linear-gradient(180deg,rgba(34,197,94,0.18),rgba(34,197,94,0.08)); }
        .chair-back.swapped  { border-color: #f59e0b; background: linear-gradient(180deg,rgba(245,158,11,0.2),rgba(245,158,11,0.08)); }

        /* Seat cushion – rectangle that frames the person */
        .chair-seat {
            width: 54px;
            height: 54px;
            border: 2.5px solid rgba(99,102,241,0.45);
            background: #1c2d44;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        .chair-seat.top    { border-top: none; border-radius: 0 0 10px 10px; }
        .chair-seat.bottom { border-bottom: none; border-radius: 10px 10px 0 0; }
        .chair-seat.complete { border-color: #22c55e; background: rgba(34,197,94,0.08); }
        .chair-seat.swapped  { border-color: #f59e0b; background: rgba(245,158,11,0.1); }

        /* Person circle sitting in the seat */
        .person-chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            font-size: 13px;
            font-weight: 700;
            border: 2px solid rgba(99,102,241,0.5);
            background: #0f172a;
            color: #94a3b8;
            transition: all 0.3s ease;
        }
        .person-chip.complete {
            border-color: #22c55e;
            color: #86efac;
            background: rgba(34, 197, 94, 0.12);
            box-shadow: 0 0 12px rgba(34, 197, 94, 0.3);
        }
        .person-chip.swapped {
            border-color: #f59e0b;
            color: #fde68a;
            background: rgba(245, 158, 11, 0.15);
            box-shadow: 0 0 16px rgba(245, 158, 11, 0.5);
            animation: pulse-swap 0.6s ease-in-out;
        }

        @keyframes pulse-swap {
            0%   { transform: scale(1); }
            40%  { transform: scale(1.25); }
            70%  { transform: scale(0.95); }
            100% { transform: scale(1); }
        }

        .matrix-cell {
            width: 22px;
            height: 22px;
            transition: background-color 0.4s ease;
        }
        .matrix-cell.had-contact { background-color: #16a34a; }
        .matrix-cell.no-contact  { background-color: #1e293b; }
        .matrix-cell.self        { background-color: #334155; }

        .card {
            background: #1e293b;
            border: 1px solid rgba(99,102,241,0.15);
            border-radius: 16px;
        }

        .table-lane {
            display: flex;
            flex-wrap: nowrap;
            justify-content: center;
            padding: 4px 8px;
            overflow-x: auto;
        }

        .table-surface {
            background: linear-gradient(180deg, #6b3f18 0%, #3d1f08 60%, #2e1605 100%);
            border: 2px solid #8b5230;
            border-radius: 12px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow:
                0 6px 20px rgba(0,0,0,0.6),
                inset 0 1px 0 rgba(255,200,120,0.12),
                inset 0 -1px 0 rgba(0,0,0,0.3);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(255,200,130,0.35);
        }

        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 480px) {
            .chair-back  { width: 38px; height: 22px; }
            .chair-seat  { width: 38px; height: 38px; }
            .person-chip { width: 26px; height: 26px; font-size: 10px; }
            .chair-container { margin: 3px 2px; }
        }

        .badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            background: rgba(99,102,241,0.2);
            color: #a5b4fc;
            border: 1px solid rgba(99,102,241,0.3);
        }

        input[type="number"] {
            background: #0f172a;
            border: 1px solid rgba(99,102,241,0.4);
            color: #e2e8f0;
            border-radius: 10px;
            padding: 10px 16px;
            width: 80px;
            font-size: 16px;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="number"]:focus { border-color: #818cf8; }
        input[type="number"]::-webkit-inner-spin-button { opacity: 0.4; }
    </style>
</head>
<body class="min-h-screen" style="background:#0f172a; color:#e2e8f0;">

    <div class="max-w-3xl mx-auto px-4 py-12">

        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold gradient-text mb-2">Seat Optimizer</h1>
            <p class="text-slate-400 text-sm">Endlich garantiert mit jedem am Tisch sprechen.</p>
        </div>

        <!-- Controls -->
        <div class="card p-6 mb-6 flex flex-col sm:flex-row items-center justify-center gap-4">
            <div class="flex flex-col items-center gap-1">
                <label class="text-xs text-slate-500 uppercase tracking-widest">Personen pro Seite</label>
                <input type="number" id="n_per_side" min="2" max="30" value="6">
            </div>
            <button onclick="optimize()" id="optimizeBtn"
                class="btn-primary text-white font-semibold px-8 py-3 rounded-xl flex items-center gap-2">
                <div class="spinner" id="spinner"></div>
                <span id="btnText">Optimieren</span>
            </button>
        </div>

        <!-- Result badge + step info -->
        <div id="resultBar" class="hidden text-center mb-4 flex items-center justify-center gap-3 flex-wrap">
            <span id="totalSwapsBadge" class="badge"></span>
            <span id="stepCounter" class="text-slate-400 text-sm"></span>
        </div>

        <!-- Seating table -->
        <div id="seatingCard" class="card p-6 mb-6 hidden">
            <div class="table-lane mb-2" id="rowA"></div>
            <div class="table-surface my-2">Tisch</div>
            <div class="table-lane mt-2" id="rowB"></div>
            <div id="swapInfo" class="text-center mt-4 text-sm text-amber-400 font-medium min-h-5"></div>
        </div>

        <!-- Next step button -->
        <div class="text-center mb-6">
            <button id="nextStep" onclick="showNextState()"
                class="btn-secondary hidden text-white font-semibold px-8 py-3 rounded-xl">
                Nächster Schritt &rarr;
            </button>
        </div>

        <!-- Contact matrix -->
        <div id="matrixCard" class="card p-6 hidden">
            <h3 class="text-xs uppercase tracking-widest text-slate-500 mb-4 text-center">Kontaktmatrix</h3>
            <div class="overflow-x-auto">
                <div id="contactMatrix"></div>
            </div>
        </div>

    </div>

    <script>
    let states = [];
    let currentState = 0;

    function optimize() {
        const n = parseInt(document.getElementById('n_per_side').value);
        if (n > 30) { alert("Maximal 30 Personen pro Tischseite."); return; }

        document.getElementById('spinner').style.display = 'block';
        document.getElementById('btnText').textContent = 'Berechne\u2026';
        document.getElementById('optimizeBtn').disabled = true;

        fetch('/optimize', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({n_per_side: n})
        })
        .then(r => r.json())
        .then(data => {
            states = data.states;
            currentState = 0;

            document.getElementById('spinner').style.display = 'none';
            document.getElementById('btnText').textContent = 'Optimieren';
            document.getElementById('optimizeBtn').disabled = false;

            document.getElementById('totalSwapsBadge').textContent =
                data.total_swaps + ' Platzwechsel n\u00f6tig';
            document.getElementById('resultBar').classList.remove('hidden');
            document.getElementById('seatingCard').classList.remove('hidden');
            document.getElementById('matrixCard').classList.remove('hidden');
            document.getElementById('nextStep').classList.remove('hidden');

            showState();
        })
        .catch(() => {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('btnText').textContent = 'Optimieren';
            document.getElementById('optimizeBtn').disabled = false;
        });
    }

    function showState() {
        const state = states[currentState];
        const n = parseInt(document.getElementById('n_per_side').value);
        const swapped = state.swap ? [state.swap[0], state.swap[1]] : [];

        document.getElementById('stepCounter').textContent =
            'Schritt ' + currentState + ' / ' + (states.length - 1);

        if (currentState >= states.length - 1) {
            document.getElementById('nextStep').classList.add('hidden');
        }

        renderRow('rowA', state, 0, n, swapped, 'top');
        renderRow('rowB', state, n, 2 * n, swapped, 'bottom');

        const info = document.getElementById('swapInfo');
        if (state.swap) {
            info.textContent = 'Person ' + (state.swap[0] + 1) + ' \u2194 Person ' + (state.swap[1] + 1) + ' getauscht';
        } else {
            info.textContent = 'Ausgangszustand';
        }

        showContactMatrix(state);
    }

    function renderRow(containerId, state, from, to, swapped, side) {
        const container = document.getElementById(containerId);
        container.innerHTML = '';
        for (let i = from; i < to; i++) {
            const person = state.arrangement[i];
            const isComplete = countBits(BigInt(state.neighbor_history[person])) >= state.total_seats;
            const isSwapped = swapped.includes(person);
            const sc = isSwapped ? ' swapped' : (isComplete ? ' complete' : '');

            const wrap = document.createElement('div');
            wrap.className = 'chair-container';

            const back = document.createElement('div');
            back.className = 'chair-back ' + side + sc;

            // Person circle inside seat cushion
            const chip = document.createElement('div');
            chip.className = 'person-chip' + sc;
            chip.textContent = person + 1;

            const seat = document.createElement('div');
            seat.className = 'chair-seat ' + side + sc;
            seat.appendChild(chip);

            if (side === 'top') {
                wrap.appendChild(back);
                wrap.appendChild(seat);
            } else {
                wrap.appendChild(seat);
                wrap.appendChild(back);
            }

            container.appendChild(wrap);
        }
    }

    function showContactMatrix(state) {
        const n = state.arrangement.length;
        let html = '<table style="border-collapse:collapse;margin:0 auto;">';
        html += '<tr><td class="matrix-cell"></td>';
        for (let i = 0; i < n; i++) {
            html += '<td class="matrix-cell" style="font-size:9px;color:#475569;text-align:center;">' + (i+1) + '</td>';
        }
        html += '</tr>';
        for (let i = 0; i < n; i++) {
            html += '<tr><td class="matrix-cell" style="font-size:9px;color:#475569;text-align:center;">' + (i+1) + '</td>';
            for (let j = 0; j < n; j++) {
                let cls;
                if (i === j) {
                    cls = 'self';
                } else {
                    const had = (BigInt(state.neighbor_history[i]) & (BigInt(1) << BigInt(j))) !== BigInt(0);
                    cls = had ? 'had-contact' : 'no-contact';
                }
                html += '<td class="matrix-cell ' + cls + '"></td>';
            }
            html += '</tr>';
        }
        html += '</table>';
        document.getElementById('contactMatrix').innerHTML = html;
    }

    function countBits(n) {
        let count = 0n, x = BigInt(n);
        while (x > 0n) { count += x & 1n; x >>= 1n; }
        return Number(count);
    }

    function showNextState() {
        if (currentState < states.length - 1) {
            currentState++;
            showState();
        }
    }
    </script>
</body>
</html>
